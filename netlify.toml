# ============================================================
# Bhavya Sampada — Netlify Configuration
# ============================================================

[build]
  # No build command needed — pure HTML/CSS/JS static site
  publish = "."

# ============================================================
# SECURITY HEADERS — improves SEO score and site security
# ============================================================
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://identity.netlify.com https://www.youtube.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; frame-src https://www.youtube.com https://player.vimeo.com; connect-src 'self' https://api.netlify.com"

# Cache static assets aggressively
[[headers]]
  for = "/content/*"
  [headers.values]
    Cache-Control = "public, max-age=60, stale-while-revalidate=300"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ============================================================
# REDIRECTS
# ============================================================
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# Friendly 404 page
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# ============================================================
# NETLIFY IDENTITY — required for CMS login
# ============================================================
[dev]
  port = 8888
