[build]
  publish = "."

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Content-Security-Policy = "default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://cdn.jsdelivr.net https://identity.netlify.com blob:; connect-src 'self' https://*.netlify.com https://api.netlify.com blob:; worker-src blob:; child-src blob:;"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/content/*"
  [headers.values]
    Cache-Control = "public, max-age=60, stale-while-revalidate=300"

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[dev]
  port = 8888
```

